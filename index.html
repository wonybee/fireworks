<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>손 폭죽</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0e1a; font-family: 'Noto Sans KR', sans-serif; }

  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* 배경+손포인트 통합 캔버스 */
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* 폭죽 전용 캔버스 */
  #firework-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* 웹캠은 숨김 (MediaPipe 입력용) */
  #webcam {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* 오른쪽 하단 PIP 미리보기 */
  #pip {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 220px;
    height: 140px;
    z-index: 10;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.15);
    transform: scaleX(-1); /* 좌우반전(거울모드) */
  }

  #status {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    letter-spacing: 0.1em;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.35);
    padding: 8px 22px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }

  #hand-state {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: white;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-shadow: 0 0 24px rgba(255,200,100,1);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="container">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <canvas id="firework-canvas"></canvas>
  <canvas id="pip"></canvas>
  <div id="status">카메라 초기화 중...</div>
  <div id="hand-state"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── 성능 모드 자동 감지 ─────────────────────────────────────
// FPS 측정 후 저사양이면 자동으로 경량 모드 전환
let perfMode = 'high'; // 'high' | 'low'
let fpsFrames = 0, fpsStart = performance.now();

function checkPerf(now) {
  fpsFrames++;
  if (fpsFrames === 60) {
    const fps = 60000 / (now - fpsStart);
    if (fps < 30) {
      perfMode = 'low';
      console.log('⚡ 저사양 감지 — 경량 모드 전환 (FPS:', Math.round(fps), ')');
    }
  }
}

const fwCtx    = fwCanvas.getContext('2d');

function resize() {
  canvas.width   = fwCanvas.width  = window.innerWidth;
  canvas.height  = fwCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── 색상 팔레트 — 10가지 컬러셋 (3색 조화) ─────────────────
const COLOR_SETS = [
  ['#FF9999','#FFD0A0','#FFE8C0'],  // 웜 코랄
  ['#FFD580','#FFE8A0','#FFF4C8'],  // 골드/샴페인
  ['#A8E8A0','#C8F0B0','#E8FFD8'],  // 민트그린
  ['#A0C8FF','#C0DCFF','#E0F0FF'],  // 아이스블루
  ['#C8A0F0','#DCC0FF','#F0E0FF'],  // 라벤더
  ['#FF9EC8','#FFC0DC','#FFE0EE'],  // 핑크로즈
  ['#FFFFFF','#F0F4FF','#D8E8FF'],  // 화이트/아이시
  ['#A0E8D0','#C0F0E0','#E0FFF4'],  // 티파니민트
  ['#FFB4A0','#FFD0C0','#FFE8E0'],  // 피치살몬
  ['#D0C0FF','#E0D4FF','#F0ECFF'],  // 연퍼플
];
const rndColorSet = () => COLOR_SETS[Math.floor(Math.random() * COLOR_SETS.length)];
const rndColor = () => { const s = rndColorSet(); return s[0]; };

// ─── 에셋 중복 방지: 최근 사용 키 추적 ──────────────────────
const recentKeys = [];
const AVOID_RECENT = Math.min(4, Math.floor(CHAR_KEYS.length / 2));

function pickCharKey() {
  const candidates = CHAR_KEYS.filter(k => !recentKeys.includes(k));
  const key = candidates[Math.floor(Math.random() * candidates.length)];
  recentKeys.push(key);
  if (recentKeys.length > AVOID_RECENT) recentKeys.shift();
  return key;
}

// ─── 파티클 클래스 (에셋 좌표에 배치) ───────────────────────
class Particle {
  constructor(cx, cy, normX, normY, size, colorLight, colorMid, colorDark, shape) {
    this.startX = cx + normX * size - size / 2;
    this.startY = cy + normY * size - size / 2;
    this.x = this.startX;
    this.y = this.startY;
    const pick = Math.random();
    this.color = pick < 0.5 ? colorLight : pick < 0.8 ? colorMid : colorDark;
    this.startTime = performance.now();
    this.duration  = 2500 + Math.random() * 500;
    this.alive = true;
    this.r = 0.8 + Math.random() * 1.5;
    // 파티클 개별 타입: dot(10%) / spark(15%) / star(40%) / diamond(35%)
    const pt = Math.random();
    this.ptype = pt < 0.10 ? 'dot'
               : pt < 0.25 ? 'spark'
               : pt < 0.65 ? 'star'
               :              'diamond';
    // spark 전용 — 랜덤 방향과 길이
    this.sparkAngle = Math.random() * Math.PI * 2;
    this.sparkLen   = 3 + Math.random() * 7;
    // 파티클마다 완전히 다른 반짝임 속도/위상
    this.twinkleSpeed = 4 + Math.random() * 18;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.twinkleDuty  = 0.3 + Math.random() * 0.4;
  }

  draw(now) {
    const elapsed = (now - this.startTime) / 1000;
    const t = elapsed / (this.duration / 1000);
    if (t >= 1) { this.alive = false; return; }

    const px = this.x;
    const py = this.y;
    const alpha = t < 0.05 ? t / 0.05 : Math.pow(1 - t, 1.1);
    // 임계값 기반 반짝임: duty 비율만큼 완전히 켜지고 나머지는 꺼짐
    const sinVal = Math.sin(now / 1000 * this.twinkleSpeed + this.twinklePhase);
    const normalized = (sinVal + 1) / 2; // 0~1
    const twinkle = normalized > (1 - this.twinkleDuty)
      ? 0.15 + 0.85 * ((normalized - (1 - this.twinkleDuty)) / this.twinkleDuty)
      : 0.05; // 꺼진 상태는 거의 완전히 투명
    const finalAlpha = Math.max(0, alpha * twinkle);
    const r = this.r;

    fwCtx.save();
    fwCtx.globalAlpha = finalAlpha;
    fwCtx.shadowBlur  = 8 + r * 3;
    fwCtx.shadowColor = this.color;
    fwCtx.fillStyle   = this.color;
    fwCtx.strokeStyle = this.color;

    if (this.ptype === 'dot') {
      // 작은 원
      fwCtx.beginPath();
      fwCtx.arc(px, py, r, 0, Math.PI * 2);
      fwCtx.fill();

    } else if (this.ptype === 'spark') {
      // 짧은 선 — 불꽃 튀기는 느낌
      fwCtx.lineWidth = r * 0.9;
      fwCtx.lineCap   = 'round';
      fwCtx.beginPath();
      fwCtx.moveTo(px - Math.cos(this.sparkAngle) * this.sparkLen * 0.3,
                   py - Math.sin(this.sparkAngle) * this.sparkLen * 0.3);
      fwCtx.lineTo(px + Math.cos(this.sparkAngle) * this.sparkLen,
                   py + Math.sin(this.sparkAngle) * this.sparkLen);
      fwCtx.stroke();

    } else if (this.ptype === 'star') {
      // 5각 별
      fwCtx.beginPath();
      for (let i = 0; i < 5; i++) {
        const outerA = (i / 5) * Math.PI * 2 - Math.PI / 2;
        const innerA = outerA + Math.PI / 5;
        if (i === 0) fwCtx.moveTo(px + Math.cos(outerA)*r,      py + Math.sin(outerA)*r);
        else         fwCtx.lineTo(px + Math.cos(outerA)*r,      py + Math.sin(outerA)*r);
        fwCtx.lineTo(px + Math.cos(innerA)*r*0.4, py + Math.sin(innerA)*r*0.4);
      }
      fwCtx.closePath();
      fwCtx.fill();

    } else {
      // 다이아몬드
      fwCtx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a  = (i / 4) * Math.PI * 2 - Math.PI / 4;
        const ai = a + Math.PI / 4;
        if (i === 0) fwCtx.moveTo(px + Math.cos(a)*r,       py + Math.sin(a)*r);
        else         fwCtx.lineTo(px + Math.cos(a)*r,       py + Math.sin(a)*r);
        fwCtx.lineTo(px + Math.cos(ai)*r*0.35, py + Math.sin(ai)*r*0.35);
      }
      fwCtx.closePath();
      fwCtx.fill();
    }

    fwCtx.restore();
  }
}

// ─── 폭죽 클래스 ─────────────────────────────────────────────
const fireworks = [];

class Firework {
  constructor(cx, cy) {
    this.alive = true;
    this.color = rndColor();
    // 컬러셋 3색 적용
    const colorSet = rndColorSet();
    this.color      = colorSet[0];
    this.colorLight = colorSet[2]; // 가장 밝게
    this.colorMid   = colorSet[1]; // 중간
    this.colorDark  = colorSet[0]; // 원색
    // 이번 폭죽 전체 파티클 모양 하나로 결정
    const sv = Math.random();
    this.shape = sv < 0.33 ? 'circle' : sv < 0.66 ? 'star' : 'diamond';
    // 폭죽 크기: 중간 50% / 작은 20% / 큰 30%
    const _sr = Math.random();
    const _sScale = _sr < 0.5 ? 0.55 + Math.random() * 0.10   // 중간: 0.55~0.65
                 : _sr < 0.7 ? 0.35 + Math.random() * 0.10   // 작은: 0.35~0.45
                 :              0.75 + Math.random() * 0.10;  // 큰:   0.75~0.85
    const size = Math.min(fwCanvas.width, fwCanvas.height) * _sScale;
    const baseSize = Math.min(fwCanvas.width, fwCanvas.height) * 0.60;
    const sizeRatio = size / baseSize;
    const countPerPt = perfMode === 'low'
      ? Math.round(9 * sizeRatio)   // 저사양: 밀도 1/3
      : Math.round(27 * sizeRatio); // 고사양: 풀 밀도
    const key = pickCharKey();
    const pts = CHAR_POINTS[key];
    this.particles = [];
    for (const [nx, ny] of pts) {
      for (let i = 0; i < countPerPt; i++) {
        this.particles.push(new Particle(cx, cy, nx, ny, size, this.colorLight, this.colorMid, this.colorDark, this.shape));
      }
    }
    // 터질 때 플래시
    this._flash(cx, cy);
  }

  _flash(x, y) {
    const g = fwCtx.createRadialGradient(x, y, 0, x, y, 80);
    g.addColorStop(0, '#FFFFFF');
    g.addColorStop(0.3, this.color);
    g.addColorStop(1, 'transparent');
    fwCtx.save();
    fwCtx.globalAlpha = 0.85;
    fwCtx.fillStyle = g;
    fwCtx.beginPath();
    fwCtx.arc(x, y, 80, 0, Math.PI * 2);
    fwCtx.fill();
    fwCtx.restore();
  }

  draw(now) {
    let anyAlive = false;
    for (const p of this.particles) {
      p.draw(now);
      if (p.alive) anyAlive = true;
    }
    if (!anyAlive) this.alive = false;
  }
}

function burstFlash(x, y, color) { /* Firework 생성자에서 처리 */ }

// ─── 손 상태 (두 손) ─────────────────────────────────────────
const hands2 = [
  { x: -1, y: -1, wasFist: false, detected: false },
  { x: -1, y: -1, wasFist: false, detected: false },
];
const statusEl    = document.getElementById('status');
const handStateEl = document.getElementById('hand-state');
let flashTimer = null;

function isFist(lm) {
  const tips = [8,12,16,20], mids = [6,10,14,18];
  let n = 0;
  for (let i = 0; i < 4; i++) {
    const tipD = Math.hypot(lm[tips[i]].x - lm[0].x, lm[tips[i]].y - lm[0].y);
    const midD = Math.hypot(lm[mids[i]].x - lm[0].x, lm[mids[i]].y - lm[0].y);
    if (tipD < midD) n++;
  }
  return n >= 3;
}

function getCenter(lm) {
  return {
    x: (1 - lm[9].x) * canvas.width,
    y: lm[9].y * canvas.height,
  };
}

// ─── 손 포인트 그리기 ─────────────────────────────────────────
function drawHandPoint(x, y) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, 20, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2.5;
  ctx.shadowBlur = 20;
  ctx.shadowColor = 'rgba(255,220,80,0.9)';
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#FFE050';
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#FFB800';
  ctx.fill();
  ctx.restore();
}

// ─── PIP 캔버스 ──────────────────────────────────────────────
const pipCanvas = document.getElementById('pip');
const pipCtx    = pipCanvas.getContext('2d');
pipCanvas.width  = 220;
pipCanvas.height = 140;

function drawPip() {
  if (videoEl.readyState >= 2) {
    pipCtx.drawImage(videoEl, 0, 0, pipCanvas.width, pipCanvas.height);
  }
}

// ─── 배경 그리기 (cover 방식) ────────────────────────────────
function drawBackground() {
  if (bgLoaded && bgImg.naturalWidth > 0) {
    const cw = canvas.width, ch = canvas.height;
    const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    const scale = Math.max(cw / iw, ch / ih);
    const dw = iw * scale, dh = ih * scale;
    const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
    ctx.drawImage(bgImg, dx, dy, dw, dh);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0,   '#060d1f');
    grad.addColorStop(0.7, '#0d1f3c');
    grad.addColorStop(1,   '#1a3a5c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  // 40% 고정 어두운 오버레이
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ─── 애니메이션 루프 ─────────────────────────────────────────
function animate(now) {
  requestAnimationFrame(animate);
  checkPerf(now);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  hands2.forEach(h => { if (h.detected && h.x >= 0) drawHandPoint(h.x, h.y); });

  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  for (let i = fireworks.length - 1; i >= 0; i--) {
    fireworks[i].draw(now);
    if (!fireworks[i].alive) fireworks.splice(i, 1);
  }

  drawPip();
}
requestAnimationFrame(animate);

// ─── MediaPipe Hands ─────────────────────────────────────────
const videoEl = document.getElementById('webcam');

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6,
});

hands.onResults(results => {
  const detected = results.multiHandLandmarks ?? [];

  // 감지된 손 수만큼 업데이트
  detected.forEach((lm, i) => {
    if (i > 1) return;
    const c = getCenter(lm);
    hands2[i].x = c.x;
    hands2[i].y = c.y;
    hands2[i].detected = true;

    const fist = isFist(lm);
    if (hands2[i].wasFist && !fist) {
      // 폭죽 위치: Y는 상단 700px 이내로 제한
      const skyLimit = 700;
      const fwX = hands2[i].x;
      const fwY = Math.min(hands2[i].y, skyLimit);
      const fw = new Firework(fwX, fwY);
      fireworks.push(fw);
      burstFlash(fwX, fwY, fw.color);
      handStateEl.textContent = '✨ 펑!';
      handStateEl.style.opacity = '1';
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => { handStateEl.style.opacity = '0'; }, 900);
    }
    hands2[i].wasFist = fist;
  });

  // 감지 안 된 손 초기화
  for (let i = detected.length; i < 2; i++) {
    hands2[i] = { x: -1, y: -1, wasFist: false, detected: false };
  }

  const detectedCount = detected.length;
  if (detectedCount === 0) {
    statusEl.textContent = '손을 카메라 앞에 놓아주세요';
  } else {
    const states = detected.slice(0,2).map((lm,i) =>
      isFist(lm) ? '✊' : '🖐'
    ).join('  ');
    statusEl.textContent = `${states} 펼치면 폭죽!`;
  }
});

const camera = new Camera(videoEl, {
  onFrame: async () => { await hands.send({ image: videoEl }); },
  width: 1280, height: 720, facingMode: 'user'
});
camera.start()
  .then(() => { statusEl.textContent = '손을 카메라 앞에 놓아주세요'; })
  .catch(e  => { statusEl.textContent = '카메라 오류: ' + e.message; });
</script>
